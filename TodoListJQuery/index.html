<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Список задач</title>
    <link rel="stylesheet" href="css_normalize.css">
    <link rel="stylesheet" href="style.css">
    <script defer src="node_modules/jquery/dist/jquery.min.js"></script>
    <script defer src="script.js"></script>
</head>
<body>
<div class="main-block">
    <h1 class="main-header">Список задач</h1>

    <form id="new-todo-form" class="new-todo-form">
        <div>
            <label for="new-todo-item-text-field">Введите текст задачи</label>
        </div>

        <div class="field-wrapper">
            <input id="new-todo-item-text-field" type="text">
            <div class="error-message">Необходимо заполнить поле</div>
        </div>

        <button>Создать</button>
    </form>

    <ul id="todo-list" class="todo-list"></ul>
</div>
</body>
</html>
