<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Первая страница</title>
</head>
<body>
<form action="/test.php" method="post">
    <label>
        Введите ваше ФИО:
        <input type="text" name="name" placeholder="Имя">
        <input type="text" name="surname" placeholder="Фамилия">
        <input type="text" name="middleName" placeholder="Отчество">
    </label>

    <br>

    <label>
        Расскажите о себе:
        <textarea name="about"></textarea>
    </label>

    <br>

    <label><input checked type="checkbox" value="1" name="married"> Женат/замужем</label>

    <br>

    <p>Город проживания:</p>
    <label><input type="radio" value="1" name="city"> Москва</label>
    <label><input type="radio" value="2" name="city"> Санкт-Петербург</label>
    <label><input checked type="radio" value="3" name="city"> Новосибирск</label>

    <br>

    <label>
        Выберите вид занятости:
        <select name="employmentType">
            <option value="1" selected>Полная</option>
            <option value="2">Частичная</option>
            <option value="3">Гибкий график</option>
        </select>
    </label>

    <br>

    <label>
        Выберите ОС для работы:
        <select name="os" multiple>
            <option value="1" selected>Windows</option>
            <option value="2">Linux</option>
            <option value="3" selected>MacOs</option>
        </select>
    </label>

    <br>

    <button type="submit">Отправить резюме</button>
</form>

<a href="page2.html" target="_blank">Ссылка на вторую страницу</a>
</body>
</html>
