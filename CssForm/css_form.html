<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CSS Form</title>
    <link rel="stylesheet" href="css_normalize.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="form_block">
    <h1 class="main_header">Отправить заявку</h1>

    <form action="css_form.html" method="post" class="client_info">
        <label for="client_name">Ваше имя</label>
        <input placeholder="Ваше имя *" required type="text" id="client_name" name="clientName">

        <label for="client_number">Ваш номер телефона</label>
        <input placeholder="Ваш номер телефона *" required type="tel" id="client_number" name="clientNumber">

        <label for="client_mail">Ваш email или VK</label>
        <input placeholder="Ваш email или VK *" required type="text" id="client_mail" name="clientMail">

        <label for="client_comment">Комментарий</label>
        <textarea rows="6" placeholder="Комментарий (не обязательно)" id="client_comment"
                  name="clientComment"></textarea>

        <p class="instruction">Заполните и отправьте форму, и мы перезвоним Вам по указанному номеру</p>

        <button class="submit_button" type="submit">Отправить заявку</button>
    </form>
</div>
</body>
</html>
